    .page {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px;
    }
    .header {
      background: rgba(46, 8, 84, 0.88);
      color: #FFD700;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(46, 8, 84, 0.18);
      backdrop-filter: blur(3px);
    }
    .header-title { font-size: 28px; font-weight: 700; margin: 0; }
    .header-sub { margin-top: 4px; color: #fff2a8; font-size: 14px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr auto auto;
      gap: 10px;
      margin-bottom: 12px;
    }
    .toolbar input, .toolbar select, .toolbar button {
      border: 1px solid #d8c98a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
      width: 100%;
    }
    .toolbar input, .toolbar select { background: rgba(255,255,255,0.95); }
    .toolbar button {
      background: #FFD700;
      color: #2E0854;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }
    .toolbar button:hover { background: #f2ca00; }
    .player-panel { margin-top: 6px; }
    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.94);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .player-name { font-size: 18px; font-weight: 700; color: #1f2937; }
    .player-kingdom { font-size: 13px; color: #6b7280; margin-top: 3px; }
    .player-status-badge {
      background: #dbeafe;
      color: #1f2937;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .info-box {
      background: rgba(255,255,255,0.94);
      border: 1px solid #e5e7eb;
      border-left: 4px solid #FFD700;
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 52px;
    }
    .info-title { font-size: 12px; color: #5b6475; margin-bottom: 4px; }
    .info-value { font-size: 16px; font-weight: 700; color: #1f2937; }
    .masterhood-wrap { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .master-crown { font-size: 20px; color: #FFD700; line-height:1; flex:0 0 auto; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .stat-card {
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 38px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.94);
    }
    .stat-label { font-size: 12px; color: #5b6475; margin-bottom: 3px; }
    .stat-value { font-size: 16px; font-weight: 700; color: #1f2937; }
    .stat-good { background: rgba(217,192,106,0.95); }
    .stat-mid { background: rgba(241,221,151,0.95); }
    .stat-low { background: rgba(234,208,208,0.95); }
    .stat-zero { background: rgba(236,236,241,0.95); }
    .members-list-wrap { margin-top: 16px; }
    .members-title {
      background: rgba(75, 0, 130, 0.9);
      color: #FFD700;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .member-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .member-card {
      background: rgba(255,255,255,0.94);
      border: 1px solid #e5e7eb;
      border-left: 5px solid #4B0082;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      position: relative;
    }
    .member-card:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
    .member-card.active {
      border-left-color: #FFD700;
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.35);
      background: rgba(255,253,242,0.98);
    }
    .member-check {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 14px;
      color: #2E0854;
      font-weight: 700;
    }
    .member-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      padding-right: 22px;
    }
    .member-name { font-weight: 700; color: #1f2937; font-size: 15px; }
    .member-meta { margin-top: 4px; font-size: 12px; color: #6b7280; line-height: 1.4; }
    .member-tag {
      display:inline-block; border-radius:999px; padding:4px 8px; font-size:11px; font-weight:700; white-space:nowrap;
    }
    .tag-cape { background: #FFD700; color: #2E0854; }
    .tag-recruit { background: #4B0082; color: #FFD700; }
    .member-crown { color:#FFD700; font-size:16px; margin-left:6px; }
    .loading,.empty,.error { text-align:center; padding:30px 12px; font-size:16px; color:white; }
    .error { color:#ffd6d6; }
    a { color:#4B0082; font-weight:700; text-decoration:none; }
    @media (max-width: 980px) {
      .info-grid,.stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .bg-phoenix { background-size: min(120vw, 900px); opacity:0.12; }
    }
    @media (max-width: 640px) {
      .info-grid,.stats-grid,.toolbar { grid-template-columns: 1fr; }
      .player-header { flex-direction:column; align-items:flex-start; }
      .header-title { font-size:22px; }
      .bg-phoenix { background-size: 135vw; opacity:0.1; }
    }
  </style>
</head>
<body>
  <h1 style="display:none;">Amtgard Player Dashboard Tracker for Awards, Attendance, and Company Stats</h1>
  <div class="bg-phoenix"></div>
  <div class="page">
    <div class="header">
      <div class="header-title">The King Makers Mercenary Company Dashboard</div>
      <div class="header-sub">Amtgard Fighting Company</div>
    </div>

    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="Search by player, park, kingdom">
      <select id="sectionFilter">
        <option value="">All Sections</option>
        <option value="Active Capes">Active Capes</option>
        <option value="Active Recruits">Active Recruits</option>
        <option value="Inactive">Inactive</option>
      </select>
      <select id="sortBy">
        <option value="default">Sort: Default</option>
        <option value="awards">Sort: Total Awards</option>
        <option value="signins">Sort: Sign-Ins</option>
        <option value="name">Sort: Name</option>
      </select>
      <button onclick="loadDashboard()">Refresh</button>
      <button onclick="clearSelected()">Clear Selected</button>
    </div>

    <div id="selectedPlayerPanel" class="player-panel"></div>

    <div class="members-list-wrap">
      <div class="members-title">Members</div>
      <div id="memberList" class="member-list"></div>
    </div>
  </div>

  <script>
    let allRows = [];
    let filteredRows = [];
    let selectedIds = [];

    function loadDashboard() {
      const panel = document.getElementById('selectedPlayerPanel');
      const list = document.getElementById('memberList');
      panel.innerHTML = '<div class="loading">Loading dashboard...</div>';
      list.innerHTML = '';

      google.script.run
        .withSuccessHandler(function(data) {
          allRows = Array.isArray(data) ? data : [];
          if (!allRows.length) {
            panel.innerHTML = '<div class="empty">No dashboard data found.</div>';
            return;
          }
          if (!selectedIds.length && allRows[0] && allRows[0].playerId) {
            selectedIds = [String(allRows[0].playerId)];
          }
          applyFiltersAndRender();
        })
        .withFailureHandler(function(err) {
          panel.innerHTML = '<div class="error">' + escapeHtml((err && err.message) ? err.message : String(err)) + '</div>';
        })
        .getCompanyDashboardData();
    }

    function applyFiltersAndRender() {
      const search = (document.getElementById('searchBox').value || '').trim().toLowerCase();
      const sectionFilter = document.getElementById('sectionFilter').value || '';
      const sortBy = document.getElementById('sortBy').value || 'default';

      filteredRows = allRows.slice();

      if (search) {
        filteredRows = filteredRows.filter(r => [r.player,r.companyStatus,r.park,r.kingdom,r.paragons,r.masterhoods].join(' ').toLowerCase().includes(search));
      }
      if (sectionFilter) {
        filteredRows = filteredRows.filter(r => r.section === sectionFilter);
      }

      if (sortBy === 'awards') {
        filteredRows.sort((a, b) => Number(b.totalAwards || 0) - Number(a.totalAwards || 0));
      } else if (sortBy === 'signins') {
        filteredRows.sort((a, b) => Number(b.signIns || 0) - Number(a.signIns || 0));
      } else if (sortBy === 'name') {
        filteredRows.sort((a, b) => String(a.player || '').localeCompare(String(b.player || '')));
      } else {
        const sectionOrder = {"Active Capes":1,"Active Recruits":2,"Inactive":3};
        filteredRows.sort((a, b) => {
          const sa = sectionOrder[a.section] || 99;
          const sb = sectionOrder[b.section] || 99;
          if (sa !== sb) return sa - sb;
          if (Number(b.totalAwards || 0) !== Number(a.totalAwards || 0)) return Number(b.totalAwards || 0) - Number(a.totalAwards || 0);
          if (Number(b.signIns || 0) !== Number(a.signIns || 0)) return Number(b.signIns || 0) - Number(a.signIns || 0);
          return String(a.player || '').localeCompare(String(b.player || ''));
        });
      }

      selectedIds = selectedIds.filter(id => filteredRows.some(r => String(r.playerId) === String(id)));
      renderSelectedPanel();
      renderMemberList(filteredRows);
    }

    function renderSelectedPanel() {
      const el = document.getElementById('selectedPlayerPanel');
      const selectedRows = getSelectedRows();
      if (!selectedRows.length) {
        el.innerHTML = '<div class="empty">No player selected.</div>';
        return;
      }
      if (selectedRows.length === 1) {
        renderSinglePlayer(el, selectedRows[0]);
        return;
      }
      renderGroupPanel(el, selectedRows);
    }

    function renderSinglePlayer(el, player) {
      const hasMasterhood = String(player.masterhoods || '').trim() !== '';
      const crown = hasMasterhood ? '<span class="master-crown" title="Has Masterhood">👑</span>' : '';
      const statusBadge = String(player.section || '').startsWith('Active') ? 'Active' : 'Inactive';
      const statCards = [['Battle', player.battle],['Warrior', player.warrior],['Crown', player.crown],['Dragon', player.dragon],['Garber', player.garber],['Owl', player.owl],['Rose', player.rose],['Smith', player.smith],['Lion', player.lion],['Gryphon', player.gryphon],['Jovius', player.jovius],['Mask', player.mask]];

      el.innerHTML = `
        <div class="player-header">
          <div>
            <div class="player-name">${escapeHtml(player.player || '')}</div>
            <div class="player-kingdom">${escapeHtml(player.kingdom || '')}</div>
          </div>
          <div class="player-status-badge">${escapeHtml(statusBadge)}</div>
        </div>

        <div class="info-grid">
          <div class="info-box"><div class="info-title">Company Status</div><div class="info-value">${escapeHtml(player.companyStatus || '-')}</div></div>
          <div class="info-box"><div class="info-title">Section</div><div class="info-value">${escapeHtml(player.section || '-')}</div></div>
          <div class="info-box"><div class="info-title">Sign-Ins</div><div class="info-value">${displayValue(player.signIns)}</div></div>
          <div class="info-box"><div class="info-title">Total Awards</div><div class="info-value">${displayValue(player.totalAwards)}</div></div>
          <div class="info-box"><div class="info-title">Paragons</div><div class="info-value">${escapeHtml(player.paragons || '-')}</div></div>
          <div class="info-box"><div class="info-title">Masterhoods</div><div class="info-value masterhood-wrap"><span>${escapeHtml(player.masterhoods || '-')}</span>${crown}</div></div>
          <div class="info-box"><div class="info-title">Park</div><div class="info-value">${escapeHtml(player.park || '-')}</div></div>
          <div class="info-box"><div class="info-title">ORK</div><div class="info-value"><a href="${escapeAttribute(player.ork || '#')}" target="_blank">View ORK</a></div></div>
        </div>

        <div class="stats-grid">
          ${statCards.map(([label, value]) => `
            <div class="stat-card ${statClass(value)}">
              <div class="stat-label">${escapeHtml(label)}</div>
              <div class="stat-value">${displayValue(value)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderGroupPanel(el, rows) {
      const agg = aggregateRows(rows);
      const kingdoms = uniqueValues(rows.map(r => r.kingdom));
      const parks = uniqueValues(rows.map(r => r.park));
      const paragons = uniqueSplitValues(rows.map(r => r.paragons));
      const masterhoods = uniqueSplitValues(rows.map(r => r.masterhoods));
      const hasMasterhood = masterhoods.length > 0;
      const crown = hasMasterhood ? '<span class="master-crown" title="Group Includes Masterhoods">👑</span>' : '';
      const capeCount = rows.filter(r => String(r.companyStatus || '') === 'Cape').length;
      const recruitCount = rows.filter(r => String(r.companyStatus || '') !== 'Cape').length;
      const statCards = [['Battle', agg.battle],['Warrior', agg.warrior],['Crown', agg.crown],['Dragon', agg.dragon],['Garber', agg.garber],['Owl', agg.owl],['Rose', agg.rose],['Smith', agg.smith],['Lion', agg.lion],['Gryphon', agg.gryphon],['Jovius', agg.jovius],['Mask', agg.mask]];

      el.innerHTML = `
        <div class="player-header">
          <div>
            <div class="player-name">${rows.length} Selected Members</div>
            <div class="player-kingdom">${escapeHtml(kingdoms.join(', ') || '-')}</div>
          </div>
          <div class="player-status-badge">Group View</div>
        </div>

        <div class="info-grid">
          <div class="info-box"><div class="info-title">Selected Members</div><div class="info-value">${rows.length}</div></div>
          <div class="info-box"><div class="info-title">Capes</div><div class="info-value">${capeCount}</div></div>
          <div class="info-box"><div class="info-title">Recruits</div><div class="info-value">${recruitCount}</div></div>
          <div class="info-box"><div class="info-title">Total Sign-Ins</div><div class="info-value">${displayValue(agg.signIns)}</div></div>
          <div class="info-box"><div class="info-title">Total Awards</div><div class="info-value">${displayValue(agg.totalAwards)}</div></div>
          <div class="info-box"><div class="info-title">Average Awards</div><div class="info-value">${rows.length ? (agg.totalAwards / rows.length).toFixed(1) : '0.0'}</div></div>
          <div class="info-box"><div class="info-title">Paragons</div><div class="info-value">${escapeHtml(paragons.join(', ') || '-')}</div></div>
          <div class="info-box"><div class="info-title">Masterhoods</div><div class="info-value masterhood-wrap"><span>${escapeHtml(masterhoods.join(', ') || '-')}</span>${crown}</div></div>
          <div class="info-box"><div class="info-title">Kingdoms</div><div class="info-value">${escapeHtml(kingdoms.join(', ') || '-')}</div></div>
          <div class="info-box"><div class="info-title">Parks</div><div class="info-value">${escapeHtml(parks.join(', ') || '-')}</div></div>
        </div>

        <div class="stats-grid">
          ${statCards.map(([label, value]) => `
            <div class="stat-card ${statClass(value)}">
              <div class="stat-label">${escapeHtml(label)}</div>
              <div class="stat-value">${displayValue(value)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMemberList(rows) {
      const el = document.getElementById('memberList');
      if (!rows.length) {
        el.innerHTML = '<div class="empty">No matching members found.</div>';
        return;
      }

      el.innerHTML = rows.map(r => {
        const isActive = selectedIds.includes(String(r.playerId));
        const tagClass = String(r.companyStatus || '') === 'Cape' ? 'tag-cape' : 'tag-recruit';
        const hasMasterhood = String(r.masterhoods || '').trim() !== '';

        return `
          <div class="member-card ${isActive ? 'active' : ''}" onclick="togglePlayer('${escapeJs(String(r.playerId || ''))}')">
            <div class="member-check">${isActive ? '✓' : ''}</div>
            <div class="member-top">
              <div>
                <div class="member-name">
                  ${escapeHtml(r.player || '')}
                  ${hasMasterhood ? '<span class="member-crown">👑</span>' : ''}
                </div>
                <div class="member-meta">
                  ${escapeHtml(r.park || '—')}<br>
                  ${escapeHtml(r.kingdom || '—')}
                </div>
              </div>
              <div class="member-tag ${tagClass}">
                ${escapeHtml(r.companyStatus || 'Recruit')}
              </div>
            </div>
            <div class="member-meta" style="margin-top:8px;">
              Awards: ${displayValue(r.totalAwards)} | Sign-Ins: ${displayValue(r.signIns)}
            </div>
          </div>
        `;
      }).join('');
    }

    function togglePlayer(playerId) {
      playerId = String(playerId);
      const idx = selectedIds.indexOf(playerId);
      if (idx >= 0) selectedIds.splice(idx, 1);
      else selectedIds.push(playerId);
      renderSelectedPanel();
      renderMemberList(filteredRows);
    }

    function clearSelected() {
      selectedIds = [];
      renderSelectedPanel();
      renderMemberList(filteredRows);
    }

    function getSelectedRows() {
      return filteredRows.filter(r => selectedIds.includes(String(r.playerId)));
    }

    function aggregateRows(rows) {
      const out = {battle:0,warrior:0,crown:0,dragon:0,garber:0,owl:0,rose:0,smith:0,lion:0,gryphon:0,jovius:0,mask:0,totalAwards:0,signIns:0};
      rows.forEach(r => {
        out.battle += Number(r.battle || 0);
        out.warrior += Number(r.warrior || 0);
        out.crown += Number(r.crown || 0);
        out.dragon += Number(r.dragon || 0);
        out.garber += Number(r.garber || 0);
        out.owl += Number(r.owl || 0);
        out.rose += Number(r.rose || 0);
        out.smith += Number(r.smith || 0);
        out.lion += Number(r.lion || 0);
        out.gryphon += Number(r.gryphon || 0);
        out.jovius += Number(r.jovius || 0);
        out.mask += Number(r.mask || 0);
        out.totalAwards += Number(r.totalAwards || 0);
        out.signIns += Number(r.signIns || 0);
      });
      return out;
    }

    function uniqueValues(arr) {
      return [...new Set(arr.map(v => String(v || '').trim()).filter(Boolean))];
    }

    function uniqueSplitValues(arr) {
      const out = new Set();
      arr.forEach(v => {
        String(v || '').split(',').map(x => x.trim()).filter(Boolean).forEach(x => out.add(x));
      });
      return [...out];
    }

    function displayValue(value) {
      return value === "" || value === null || value === undefined ? "0" : String(value);
    }

    function statClass(value) {
      const n = Number(value || 0);
      if (n >= 9) return 'stat-good';
      if (n >= 4) return 'stat-mid';
      if (n > 0) return 'stat-low';
      return 'stat-zero';
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function escapeAttribute(str) {
      return String(str).replace(/"/g, '&quot;');
    }

    function escapeJs(str) {
      return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    document.getElementById('searchBox').addEventListener('input', applyFiltersAndRender);
    document.getElementById('sectionFilter').addEventListener('change', applyFiltersAndRender);
    document.getElementById('sortBy').addEventListener('change', applyFiltersAndRender);
    window.addEventListener('load', loadDashboard);
  </script>
</body>
</html>
